version: '3.8'

services:
  mariadb:
    build: requirements/mariadb
    image: mariadb:inception
    container_name: mariadb
    hostname: mariadb
    env_file: .env
    volumes:
      - wordpress_db:/var/lib/mysql
    networks:
      - inception_network
    restart: always

  wordpress:
    build: requirements/wordpress
    image: wordpress:inception
    container_name: wp_php
    hostname: wp-php
    env_file: .env
    depends_on:
      - mariadb
    volumes:
      - wordpress_files:/var/www/html
    networks:
      - inception_network
    restart: always

  nginx:
    build: requirements/nginx
    image: nginx:inception
    container_name: nginx
    hostname: nginx
    ports:
      - "443:443"
    env_file: .env
    depends_on:
      - wordpress
    volumes:
      - wordpress_files:/var/www/html
    networks:
      - inception_network
    restart: always

volumes:
  wordpress_db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/erico-ke/data/mariadb
  wordpress_files:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/erico-ke/data/wordpress

networks:
  inception_network:
    driver: bridge
